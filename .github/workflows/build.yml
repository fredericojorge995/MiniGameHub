name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - run: mvn clean package -DskipTests
    
    - run: mv target/*.jar MinigameHub-1.0.jar
    
    - uses: actions/upload-artifact@v4
      with:
        name: MinigameHub-1.0
        path: MinigameHub-1.0.jar
